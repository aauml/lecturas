name: Glossa publish (from chat via Supabase)

# Publica una lectura encolada desde una superficie SIN git (chat/móvil).
# Cadena: chat -> INSERT glossa_publish_requests (state='queued')
#         -> trigger glossa_publish_dispatch (pg_net) -> repository_dispatch [glossa_publish]
#         -> este workflow materializa los MDX al repo -> Vercel despliega
#         -> escribe url_en/url_es/commit_sha de vuelta en la fila (y en glossa_issues).
#
# Sin secretos: usa la anon key PÚBLICA de Supabase (la misma que el sitio expone),
# mínimo privilegio. El commit lo hace el GITHUB_TOKEN propio del Action.

on:
  repository_dispatch:
    types: [glossa_publish]
  workflow_dispatch:
    inputs:
      id:
        description: 'glossa_publish_requests.id'
        required: true

permissions:
  contents: write

concurrency:
  group: glossa-publish
  cancel-in-progress: false

env:
  SUPABASE_URL: https://wtwuvrtmadnlezkbesqp.supabase.co
  # anon key pública (rol "anon"); ya expuesta en el cliente. NO es un secreto.
  SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0d3V2cnRtYWRubGV6a2Jlc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzczMDYsImV4cCI6MjA4OTUxMzMwNn0.1eCIlv6URloKHnEzxB2drHtiS2NR_VH_2DHF6YFLerY

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve request id
        id: rid
        run: echo "id=${{ github.event.client_payload.id || github.event.inputs.id }}" >> "$GITHUB_OUTPUT"

      - name: Prepare files from Supabase
        id: prep
        run: node scripts/publish_from_supabase.mjs prepare "${{ steps.rid.outputs.id }}"

      - name: Install & build (validate)
        run: |
          npm ci || npm install
          npm run build

      - name: Commit & push
        id: push
        run: |
          git config user.name "Glossa Bot"
          git config user.email "glossa@thesis.local"
          git add src/content/articles/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "${{ steps.prep.outputs.issue_no }} — ${{ steps.prep.outputs.slug }} (publicado desde chat)"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Finalize (write urls/status back)
        if: success()
        run: node scripts/publish_from_supabase.mjs finalize "${{ steps.rid.outputs.id }}" "${{ steps.push.outputs.sha }}"

      - name: Mark error on failure
        if: failure()
        run: node scripts/publish_from_supabase.mjs fail "${{ steps.rid.outputs.id }}" "glossa-publish workflow failed" || true
